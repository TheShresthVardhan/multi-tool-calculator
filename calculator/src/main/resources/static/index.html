<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tool Calculator</title>
    <style>
        :root {
            --bg-page: #f1f3f4;
            --bg-calc: #ffffff;
            --text-main: #202124;
            --text-sec: #70757a;
            --bg-btn: #f1f3f4;
            --bg-btn-hover: #e8eaed;
            --border: #e0e0e0;
            --color-op: #1a73e8;
            --bg-eq: #1a73e8;
            --color-eq: #ffffff;
            --bg-eq-hover: #1557b0;
            --color-clear: #d93025;
            --overlay: rgba(0, 0, 0, 0.5);
        }

        body.dark-mode {
            --bg-page: #202124;
            --bg-calc: #303134;
            --text-main: #e8eaed;
            --text-sec: #9aa0a6;
            --bg-btn: #3c4043;
            --bg-btn-hover: #5f6368;
            --border: #5f6368;
            --color-op: #8ab4f8;
            --bg-eq: #8ab4f8;
            --color-eq: #202124;
            --bg-eq-hover: #aecbfa;
            --color-clear: #f28b82;
            --overlay: rgba(0, 0, 0, 0.7);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-page);
            transition: 0.3s;
        }

        .calculator {
            background: var(--bg-calc);
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px 0;
            align-items: center;
        }

        .header-controls {
            display: flex;
            gap: 5px;
        }

        .header-title {
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            margin: 0;
            flex-grow: 1;
            padding-left: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-sec);
            padding: 8px;
            border-radius: 50%;
        }

        .icon-btn:hover {
            background: var(--bg-btn);
        }

        /* Sidebar Menu */
        .sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            z-index: 15;
            display: none;
        }

        .sidebar {
            position: absolute;
            top: 0;
            left: -250px;
            width: 220px;
            height: 100%;
            background: var(--bg-calc);
            z-index: 20;
            transition: left 0.3s ease;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            padding-top: 20px;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-overlay.show {
            display: block;
        }

        .menu-item {
            padding: 15px 20px;
            color: var(--text-main);
            cursor: pointer;
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
        }

        .menu-item:hover {
            background: var(--bg-btn);
        }

        /* App Panels */
        .app-panel {
            display: none;
            flex: 1;
            flex-direction: column;
            position: relative;
        }

        .app-panel.active {
            display: flex;
        }

        /* Standard Calc Styles */
        .display {
            padding: 10px 20px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #equation-preview {
            color: var(--text-sec);
            font-size: 14px;
            min-height: 20px;
        }

        #current {
            color: var(--text-main);
            font-size: 40px;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            flex: 1;
        }

        button.calc-btn {
            background: var(--bg-btn);
            border: none;
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.1s;
            padding: 15px 0;
        }

        button.calc-btn:hover {
            background: var(--bg-btn-hover);
        }

        .btn-op {
            color: var(--color-op) !important;
            font-size: 22px !important;
        }

        .btn-equals {
            background: var(--bg-eq) !important;
            color: var(--color-eq) !important;
            font-size: 24px !important;
        }

        .btn-clear {
            color: var(--color-clear) !important;
        }

        /* History Panel Styles */
        .history-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-calc);
            z-index: 10;
            display: none;
            overflow-y: auto;
            padding: 15px;
            box-sizing: border-box;
        }

        .history-panel.show {
            display: block;
        }

        .history-item {
            text-align: right;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bg-page);
        }

        .history-item .eq {
            color: var(--text-sec);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .history-item .res {
            color: var(--text-main);
            font-size: 22px;
            font-weight: 500;
        }

        .empty-history {
            text-align: center;
            color: var(--text-sec);
            margin-top: 40px;
            font-size: 14px;
        }

        .btn-clear-history {
            width: 100%;
            padding: 10px;
            background: var(--bg-btn);
            color: var(--text-main);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .btn-clear-history:hover {
            background: var(--bg-btn-hover);
        }

        /* Form Layouts (BMI & Unit) */
        .form-layout {
            padding: 20px;
            color: var(--text-main);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 2;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg-page);
            color: var(--text-main);
            font-size: 16px;
        }

        .input-group select {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg-page);
            color: var(--text-main);
            font-size: 16px;
        }

        .action-btn {
            background: var(--bg-eq);
            color: var(--color-eq);
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .action-btn:hover {
            background: var(--bg-eq-hover);
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: var(--bg-btn);
            border-radius: 5px;
            text-align: center;
        }

        .result-box h3 {
            margin: 0 0 5px;
            font-size: 24px;
            color: var(--color-op);
        }

        .result-box p {
            margin: 0;
            color: var(--text-sec);
            font-size: 14px;
        }

        label {
            font-size: 14px;
            color: var(--text-sec);
            margin-bottom: -10px;
            display: block;
        }

        /* Category Icon Selector Styles */
        .category-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .cat-btn {
            flex: 1;
            padding: 10px 0;
            background: var(--bg-btn);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: inherit;
        }

        .cat-btn .icon {
            font-size: 20px;
        }

        .cat-btn:hover {
            background: var(--bg-btn-hover);
        }

        .cat-btn.active {
            background: var(--bg-eq);
            color: var(--color-eq);
            border-color: var(--bg-eq);
        }


    </style>
</head>

<body>

    <div class="calculator">
        <!-- Sidebar / menu -->
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
        <div class="sidebar" id="sidebar">
            <div class="menu-item" onclick="switchApp('standard', 'Standard Calculator')">🧮 Standard Calculator</div>
            <div class="menu-item" onclick="switchApp('bmi', 'BMI Calculator')">⚖️ BMI Calculator</div>
            <div class="menu-item" onclick="switchApp('unit', 'Unit Converter')">🔄 Unit Converter</div>
        </div>

        <!-- Header -->
        <div class="header">
            <button class="icon-btn" onclick="toggleMenu()">☰</button>
            <h3 class="header-title" id="app-title">Standard Calculator</h3>
            <div class="header-controls">
                <button class="icon-btn" id="history-toggle-btn" onclick="toggleHistory()"
                    title="View History">🕒</button>
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</button>
            </div>
        </div>

        <!-- Standard Calculator -->
        <div class="app-panel active" id="standard-calc">
            <!-- History overlay -->
            <div class="history-panel" id="history-panel">
                <div class="empty-history">No history yet</div>
            </div>

            <!-- Display -->
            <div class="display">
                <div id="equation-preview"></div>
                <div id="current">0</div>
            </div>
            <!-- Keypad -->
            <div class="buttons">
                <button class="calc-btn btn-clear" onclick="clearDisplay()">AC</button>
                <button class="calc-btn btn-clear" onclick="handleBackspace()">⌫</button>
                <button class="calc-btn btn-op" onclick="applyPercentage()">%</button>
                <button class="calc-btn btn-op" onclick="appendOperator('divide')">÷</button>

                <button class="calc-btn" onclick="appendNumber('7')">7</button>
                <button class="calc-btn" onclick="appendNumber('8')">8</button>
                <button class="calc-btn" onclick="appendNumber('9')">9</button>
                <button class="calc-btn btn-op" onclick="appendOperator('multiply')">×</button>

                <button class="calc-btn" onclick="appendNumber('4')">4</button>
                <button class="calc-btn" onclick="appendNumber('5')">5</button>
                <button class="calc-btn" onclick="appendNumber('6')">6</button>
                <button class="calc-btn btn-op" onclick="appendOperator('subtract')">−</button>

                <button class="calc-btn" onclick="appendNumber('1')">1</button>
                <button class="calc-btn" onclick="appendNumber('2')">2</button>
                <button class="calc-btn" onclick="appendNumber('3')">3</button>
                <button class="calc-btn btn-op" onclick="appendOperator('add')">+</button>

                <button class="calc-btn" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                <button class="calc-btn" onclick="appendNumber('.')">.</button>
                <button class="calc-btn btn-equals" onclick="calculate()">=</button>
            </div>
        </div>

        <!-- BMI Calculator -->
        <div class="app-panel" id="bmi-calc">
            <div class="form-layout">
                <label>Weight</label>
                <div class="input-group">
                    <input type="number" id="bmi-weight" placeholder="Enter weight">
                    <select id="bmi-weight-unit">
                        <option value="kg">kg</option>
                        <option value="lb">pounds</option>
                    </select>
                </div>

                <label>Height</label>
                <div class="input-group">
                    <input type="number" id="bmi-height" placeholder="Enter height">
                    <select id="bmi-height-unit">
                        <option value="cm">cm</option>
                        <option value="in">inches</option>
                    </select>
                </div>

                <button class="action-btn" onclick="calculateBmi()">Calculate BMI</button>

                <div class="result-box" style="display: none;" id="bmi-result-box">
                    <h3 id="bmi-score">22.5</h3>
                    <p id="bmi-category">Normal weight</p>
                </div>
            </div>
        </div>

        <!-- Unit Converter -->
        <div class="app-panel" id="unit-calc">
            <div class="form-layout">
                <div class="category-selector">
                    <button class="cat-btn active" onclick="setUnitCategory('length', this)"><span
                            class="icon">📏</span>Length</button>
                    <button class="cat-btn" onclick="setUnitCategory('weight', this)"><span
                            class="icon">⚖️</span>Weight</button>
                    <button class="cat-btn" onclick="setUnitCategory('temperature', this)"><span
                            class="icon">🌡️</span>Temp</button>
                    <button class="cat-btn" onclick="setUnitCategory('currency', this)"><span
                            class="icon">💵</span>Currency</button>
                </div>

                <input type="hidden" id="unit-category" value="length">

                <label>From</label>
                <div class="input-group">
                    <input type="number" id="unit-input" placeholder="Value">
                    <select id="unit-from"></select>
                </div>

                <label>To</label>
                <div class="input-group">
                    <input type="number" id="unit-output" placeholder="Result" readonly
                        style="background: var(--bg-btn);">
                    <select id="unit-to"></select>
                </div>

                <button class="action-btn" onclick="convertUnit()">Convert</button>
            </div>
        </div>

    </div>

    <script>
        // --- UI / Theme / Menu ---
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('show'); }

        function switchApp(appId, title) {
            document.querySelectorAll('.app-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(appId + '-calc').classList.add('active');
            document.getElementById('app-title').innerText = title;

            const historyBtn = document.getElementById('history-toggle-btn');
            if (appId === 'standard') { historyBtn.style.display = 'block'; }
            else { historyBtn.style.display = 'none'; document.getElementById('history-panel').classList.remove('show'); }

            toggleMenu();
            if (appId === 'unit') updateUnitDropdowns();
        }

        // --- Standard Calculator ---
        let currentNum = '0', previousNum = '', currentOperator = '', operatorSymbol = '';
        let historyLog = [];
        const currentDisplay = document.getElementById('current'), previewDisplay = document.getElementById('equation-preview'), historyPanel = document.getElementById('history-panel');

        function updateDisplay() {
            if (currentNum === '' && currentOperator === '') currentDisplay.innerText = '0';
            else if (currentNum === '' && currentOperator !== '') currentDisplay.innerText = '';
            else currentDisplay.innerText = currentNum;
            previewDisplay.innerText = currentOperator ? `${previousNum} ${operatorSymbol}` : '';
        }

        function appendNumber(num) {
            if (currentNum.endsWith('%')) return;
            if (currentNum === '0' && num !== '.') currentNum = num;
            else { if (num === '.' && currentNum.includes('.')) return; currentNum += num; }
            updateDisplay();
        }

        function handleBackspace() {
            if (currentNum === 'Error') { clearDisplay(); return; }
            if (currentNum !== '') currentNum = currentNum.slice(0, -1);
            else if (currentOperator !== '') { currentOperator = ''; operatorSymbol = ''; currentNum = previousNum; previousNum = ''; }
            updateDisplay();
        }

        function applyPercentage() {
            if (currentNum === '' || currentNum === 'Error' || currentNum.endsWith('%')) return;
            if (currentNum !== '0') currentNum += '%';
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentNum.endsWith('%')) currentNum = String(parseFloat(currentNum.replace('%', '')) / 100);
            if (currentNum === '' && previousNum !== '') { currentOperator = op; setOperatorSymbol(op); updateDisplay(); return; }
            if (previousNum !== '') calculate();
            currentOperator = op; previousNum = currentNum; currentNum = ''; setOperatorSymbol(op); updateDisplay();
        }

        function setOperatorSymbol(op) {
            const ops = { 'add': '+', 'subtract': '−', 'multiply': '×', 'divide': '÷' };
            operatorSymbol = ops[op];
        }

        function clearDisplay() { currentNum = '0'; previousNum = ''; currentOperator = ''; operatorSymbol = ''; updateDisplay(); }

        async function calculate() {
            if (!currentOperator || !previousNum || currentNum === '') return;

            let finalNum2 = currentNum;
            if (currentNum.endsWith('%')) {
                let pv = parseFloat(currentNum.replace('%', ''));
                finalNum2 = (currentOperator === 'add' || currentOperator === 'subtract') ? String(parseFloat(previousNum) * (pv / 100)) : String(pv / 100);
            }

            const eqString = `${previousNum} ${operatorSymbol} ${currentNum} =`;

            try {
                const response = await fetch(`/api/calculate?num1=${previousNum}&num2=${finalNum2}&operation=${currentOperator}`);
                const data = await response.json();
                if (data.error) { currentNum = "Error"; setTimeout(clearDisplay, 1500); }
                else { currentNum = String(data.result); addToHistory(eqString, currentNum); }

                previousNum = ''; currentOperator = ''; updateDisplay();
            } catch (e) {
                currentNum = "Error"; updateDisplay();
            }
        }

        function toggleHistory() { historyPanel.classList.toggle('show'); }
        function addToHistory(equation, result) { historyLog.unshift({ equation, result }); renderHistory(); }
        function clearHistory() { historyLog = []; renderHistory(); }
        function renderHistory() {
            if (historyLog.length === 0) { historyPanel.innerHTML = '<div class="empty-history">No history yet</div>'; return; }
            let historyHTML = `<button class="btn-clear-history" onclick="clearHistory()">Clear History</button>`;
            historyHTML += historyLog.map(item => `<div class="history-item"><div class="eq">${item.equation}</div><div class="res">${item.result}</div></div>`).join('');
            historyPanel.innerHTML = historyHTML;
        }

        // --- BMI Calculator ---
        async function calculateBmi() {
            const weight = document.getElementById('bmi-weight').value;
            const height = document.getElementById('bmi-height').value;
            const wUnit = document.getElementById('bmi-weight-unit').value;
            const hUnit = document.getElementById('bmi-height-unit').value;
            const box = document.getElementById('bmi-result-box');

            if (!weight || !height) return;

            try {
                const res = await fetch(`/api/bmi?weight=${weight}&weightUnit=${wUnit}&height=${height}&heightUnit=${hUnit}`);
                const data = await res.json();

                if (data.error) {
                    document.getElementById('bmi-score').innerText = "Error";
                    document.getElementById('bmi-category').innerText = data.error;
                } else {
                    document.getElementById('bmi-score').innerText = data.result;
                    document.getElementById('bmi-category').innerText = data.category;
                }
                box.style.display = 'block';
            } catch (e) {
                console.error(e);
            }
        }

        // --- Unit Converter ---
        const units = {
            length: [{ v: 'm', t: 'Meter' }, { v: 'km', t: 'Kilometer' }, { v: 'cm', t: 'Centimeter' }, { v: 'mm', t: 'Millimeter' }, { v: 'in', t: 'Inch' }, { v: 'ft', t: 'Foot' }, { v: 'yd', t: 'Yard' }, { v: 'mi', t: 'Mile' }],
            weight: [{ v: 'kg', t: 'Kilogram' }, { v: 'g', t: 'Gram' }, { v: 'mg', t: 'Milligram' }, { v: 'lb', t: 'Pound' }, { v: 'oz', t: 'Ounce' }],
            temperature: [{ v: 'C', t: 'Celsius' }, { v: 'F', t: 'Fahrenheit' }, { v: 'K', t: 'Kelvin' }],
            currency: [{ v: 'USD', t: '🇺🇸 US Dollar' }, { v: 'EUR', t: '🇪🇺 Euro' }, { v: 'GBP', t: '🇬🇧 British Pound' }, { v: 'INR', t: '🇮🇳 Indian Rupee' }, { v: 'JPY', t: '🇯🇵 Japanese Yen' }, { v: 'CAD', t: '🇨🇦 Canadian Dollar' }, { v: 'AUD', t: '🇦🇺 Australian Dollar' }, { v: 'CHF', t: '🇨🇭 Swiss Franc' }, { v: 'CNY', t: '🇨🇳 Chinese Yuan' }, { v: 'SGD', t: '🇸🇬 Singapore Dollar' }, { v: 'NZD', t: '🇳🇿 New Zealand Dollar' }, { v: 'ZAR', t: '🇿🇦 South African Rand' }, { v: 'BRL', t: '🇧🇷 Brazilian Real' }, { v: 'KRW', t: '🇰🇷 South Korean Won' }]
        };

        function setUnitCategory(categoryName, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('unit-category').value = categoryName;
            document.getElementById('unit-input').value = '';
            document.getElementById('unit-output').value = '';
            updateUnitDropdowns();
        }

        function updateUnitDropdowns() {
            const cat = document.getElementById('unit-category').value;
            const fromDrop = document.getElementById('unit-from');
            const toDrop = document.getElementById('unit-to');

            let optionsHTML = units[cat].map(u => `<option value="${u.v}">${u.t}</option>`).join('');
            fromDrop.innerHTML = optionsHTML;
            toDrop.innerHTML = optionsHTML;

            if (units[cat].length > 1) toDrop.selectedIndex = 1;
        }

        async function convertUnit() {
            const val = document.getElementById('unit-input').value;
            const cat = document.getElementById('unit-category').value;
            const from = document.getElementById('unit-from').value;
            const to = document.getElementById('unit-to').value;

            if (!val) { document.getElementById('unit-output').value = ''; return; }

            try {
                const res = await fetch(`/api/convert?value=${val}&category=${cat}&fromUnit=${from}&toUnit=${to}`);
                const data = await res.json();
                if (data.error) document.getElementById('unit-output').value = "Error";
                else document.getElementById('unit-output').value = data.result;
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>

</html>
